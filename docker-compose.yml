services:
  signals:
    build: .
    # No fixed container_name — Compose names it from the project (e.g. algo-signals-1)
    # so a leftover/renamed project can't collide on a hardcoded name.
    ports:
      # Dashboard only. The OHLC bridge stays internal on 127.0.0.1:9008.
      - "8080:8080"
    volumes:
      # Persist rsi_alerts.json (start.sh symlinks it here) across rebuilds.
      - ./data:/app/data
    restart: unless-stopped
