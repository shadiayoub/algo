version: '3.8'

services:
  # RSI Alert Bot
  rsi-bot:
    build: .  # This builds using your Dockerfile
    container_name: rsi-alert-bot
    working_dir: /app
    volumes:
      - ./:/app
    command: python -u alertPivotRsi.py
    restart: unless-stopped
    networks:
      - rsi-network

  # HTTP Server for HTML UI
  web-ui:
    image: python:3.9-slim
    container_name: rsi-web-ui
    working_dir: /app
    volumes:
      - ./:/app
    command: python -m http.server 8080
    ports:
      - "8880:8080"
    restart: unless-stopped
    networks:
      - rsi-network

networks:
  rsi-network:
    driver: bridge
